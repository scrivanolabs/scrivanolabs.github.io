  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        container: {
          center: true,
        },
        extend: {
          colors: {
            clifford: '#da373d',
          }
        },
        fontFamily : {
          'sans': 'Inter, Helvetica, Arial, sans-serif',
        }
      }
    }
  </script>
<script defer data-domain="scrivanolabs.github.io" src="https://plausible.io/js/plausible.js"></script>
<script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  <script>
    window.onload = function () {
      var btn = document.getElementById("mobile-menu-button");
      const menu = document.querySelector(".mobile-menu");
      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });

    }
  </script>
  <!-- Lightweight client-side loader that feature-detects and load polyfills only when necessary -->
<script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2/webcomponents-loader.min.js"></script>

<!-- Load the element definition -->
<script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@1/src/zero-md.min.js"></script>

</head>

<body>
  <nav class="bg-gray-800">

              </div>
            </div>
          </div>
        </div>

        <div class="md:hidden flex items-center mr-4">
          <button class="outline-none" id="mobile-menu-button">
            <svg class="w-6 h-6 text-gray-500" x-show="!showMenu" fill="none" stroke-linecap="round"

      <li class="active bg-gray-800 hover:bg-gray-500">

      <li class="active bg-gray-500">

      </li>
    </ul>
  </div>
  </div>

  <div class="mx-auto max-w-7xl mt-4 ml-2 lg:ml-auto">
